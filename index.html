        function renderAll() {
            switch (currentMode) {
                case 'day':
                    renderDayView(currentDate);
                    break;
                case 'week':
                    renderWeekView(currentDate);
                    break;
                case 'month':
                    renderMonthView();
                    break;
                case 'year':
                    renderYearView(currentDate.getFullYear());
                    break;
            }

            const title = document.getElementById('modalTitle').textContent;
            if (title.includes('Задачи')) {
                renderTasks();
            }
            if (title.includes('Галерея')) {
                renderGallery();
            }
            if (title.includes('Профиль')) {
                openProfile();
            }
        }

        // ============================================
        // 10. МОДАЛЬНЫЕ ОКНА
        // ============================================
        function openModal(title, content) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('mainModal').classList.add('modal-overlay--open');
        }

        function closeModal() {
            document.getElementById('mainModal').classList.remove('modal-overlay--open');
        }

        // ============================================
        // 11. ДОБАВЛЕНИЕ ЗАДАЧИ
        // ============================================
        let pendingTaskDate = null;
        let pendingTaskTime = null;

        function openAddTaskForDate(dateStr, timeStr) {
            pendingTaskDate = dateStr;
            pendingTaskTime = timeStr || '08:00';

            document.getElementById('taskStart').value = dateStr;
            document.getElementById('taskEnd').value = new Date(new Date(dateStr).getTime() + 30 * 86400000)
            .toISOString().split('T')[0];
            document.getElementById('taskTime').value = pendingTaskTime;

            const titleEl = document.getElementById('addTaskModalTitle');
            if (timeStr) {
                titleEl.textContent = '📝 Новая задача на ' + dateStr + ' в ' + timeStr;
            } else {
                titleEl.textContent = '📝 Новая задача на ' + dateStr;
            }

            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDesc').value = '';
            document.getElementById('taskDuration').value = '30';
            document.getElementById('taskCategory').value = 'physical';

            const dayOfWeek = new Date(dateStr + 'T00:00:00').getDay();
            const checkboxes = document.querySelectorAll('#taskSchedule input[type="checkbox"]');
            checkboxes.forEach(cb => {
                cb.checked = (parseInt(cb.value) === dayOfWeek);
            });

            document.getElementById('addTaskModal').classList.add('modal-overlay--open');
        }

        function openAddTask() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('taskStart').value = today;
            document.getElementById('taskEnd').value = new Date(Date.now() + 30 * 86400000).toISOString().split('T')[0];
            document.getElementById('addTaskModalTitle').textContent = '📝 Новая задача';
            document.getElementById('addTaskModal').classList.add('modal-overlay--open');
        }

        function closeAddTask() {
            document.getElementById('addTaskModal').classList.remove('modal-overlay--open');
            pendingTaskDate = null;
            pendingTaskTime = null;
        }

        function handleAddTask() {
            const title = document.getElementById('taskTitle').value.trim();
            const desc = document.getElementById('taskDesc').value.trim();
            const category = document.getElementById('taskCategory').value;
            const duration = document.getElementById('taskDuration').value;
            const time = document.getElementById('taskTime').value;
            const start = document.getElementById('taskStart').value;
            const end = document.getElementById('taskEnd').value;

            if (!title) { alert('Введите название'); return; }
            if (!duration || duration < 1) { alert('Длительность должна быть > 0'); return; }

            const checks = document.querySelectorAll('#taskSchedule input[type="checkbox"]');
            const schedule = [];
            checks.forEach(cb => { if (cb.checked) schedule.push(parseInt(cb.value)); });
            if (schedule.length === 0) { alert('Выберите хотя бы один день'); return; }

            addTask(title, desc, category, duration, schedule, time, start, end);
            closeAddTask();
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDesc').value = '';

            if (document.getElementById('modalTitle').textContent.includes('Задачи')) {
                openModal('📋 Задачи', getTasksHTML());
                renderTasks();
            }
            alert('✅ Задача создана!');
        }

        function getTasksHTML() {
            return `
                <div style="margin-bottom:16px;">
                    <button class="form-btn" onclick="openAddTask()">➕ Добавить задачу</button>
                </div>
                <div id="tasksContainer"></div>
            `;
        }

        // ============================================
        // 12. ДОБАВЛЕНИЕ ФОТО
        // ============================================
        function openAddPhoto() {
            document.getElementById('addPhotoModal').classList.add('modal-overlay--open');
        }

        function closeAddPhoto() {
            document.getElementById('addPhotoModal').classList.remove('modal-overlay--open');
        }

        function handleAddPhoto() {
            const input = document.getElementById('photoInput');
            const comment = document.getElementById('photoComment').value.trim();

            if (!input.files || !input.files[0]) {
                alert('Выберите фото');
                return;
            }

            const file = input.files[0];
            if (!file.type.startsWith('image/')) {
                alert('Выберите изображение');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                addGalleryItem(e.target.result, comment || 'Без комментария');
                closeAddPhoto();
                input.value = '';
                document.getElementById('photoComment').value = '';

                if (document.getElementById('modalTitle').textContent.includes('Галерея')) {
                    openModal('🖼️ Галерея', getGalleryHTML());
                    renderGallery();
                }
            };
            reader.readAsDataURL(file);
        }

        function getGalleryHTML() {
            return `
                <div style="margin-bottom:16px;">
                    <button class="form-btn" onclick="openAddPhoto()">➕ Добавить фото</button>
                </div>
                <div id="galleryContainer" class="gallery-grid"></div>
            `;
        }

        // ============================================
        // 13. ПРОФИЛЬ
        // ============================================
        function calculateBMI(weight, height) {
            if (!weight || !height || height === 0) return null;
            const heightM = height / 100;
            return Math.round((weight / (heightM * heightM)) * 10) / 10;
        }

        function getBMICategory(bmi) {
            if (!bmi) return { label: 'Нет данных', color: '#888', emoji: '❓' };
            if (bmi < 16) return { label: 'Выраженный дефицит', color: '#e17055', emoji: '⚠️' };
            if (bmi < 18.5) return { label: 'Недостаточный вес', color: '#fdcb6e', emoji: '📉' };
            if (bmi < 25) return { label: 'Нормальный вес', color: '#00b894', emoji: '✅' };
            if (bmi < 30) return { label: 'Избыточный вес', color: '#fdcb6e', emoji: '📈' };
            if (bmi < 35) return { label: 'Ожирение I', color: '#e17055', emoji: '⚠️' };
            return { label: 'Ожирение II+', color: '#d63031', emoji: '🚨' };
        }

        function getTaskStats() {
            const today = new Date().toISOString().split('T')[0];
            let total = tasks.length;
            let completed = 0;
            let inProgress = 0;
            let failed = 0;

            tasks.forEach(task => {
                if (task.done.length > 0) completed++;
                if (task.end >= today) inProgress++;
            });
            failed = total - completed;

            return { total, completed, inProgress, failed };
        }

        function updateProfileField(field, value) {
            user[field] = value;
            saveUser();
            if (field === 'name') {
                document.getElementById('userName').textContent = value;
            }
            if (document.getElementById('modalTitle').textContent.includes('Профиль')) {
                openProfile();
            }
        }

        function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                alert('Выберите изображение');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                user.avatar = e.target.result;
                saveUser();
                document.getElementById('avatar').src = user.avatar;
                if (document.getElementById('modalTitle').textContent.includes('Профиль')) {
                    openProfile();
                }
                alert('✅ Аватар обновлён!');
            };
            reader.readAsDataURL(file);
        }

        function openProfile() {
            const bmi = calculateBMI(user.weight, user.height);
            const bmiInfo = getBMICategory(bmi);
            const stats = getTaskStats();

            // Статистика по категориям
            const categoryStats = {
                physical: { count: 0, done: 0 },
                creative: { count: 0, done: 0 },
                practical: { count: 0, done: 0 }
            };

            tasks.forEach(task => {
                const cat = task.category || 'practical';
                if (categoryStats[cat]) {
                    categoryStats[cat].count++;
                    if (task.done.length > 0) {
                        categoryStats[cat].done++;
                    }
                }
            });

            const content = `
                <!-- АВАТАР -->
                <div style="text-align:center;margin-bottom:20px;">
                    <img src="${user.avatar}" style="width:100px;height:100px;border-radius:50%;border:3px solid var(--accent);object-fit:cover;">
                    <div style="margin-top:8px;">
                        <button class="form-btn" style="width:auto;padding:6px 16px;font-size:13px;" onclick="document.getElementById('avatarInput').click()">
                            📷 Сменить аватар
                        </button>
                        <input type="file" id="avatarInput" accept="image/*" style="display:none;" onchange="handleAvatarUpload(event)">
                    </div>
                </div>

                <!-- ФОРМА -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                    <div class="form-group" style="grid-column:1/3;">
                        <label class="form-label">👤 Имя</label>
                        <input class="form-input" id="profileName" value="${user.name}" onchange="updateProfileField('name', this.value)">
                    </div>
                    <div class="form-group">
                        <label class="form-label">🎂 Возраст</label>
                        <input class="form-input" id="profileAge" type="number" value="${user.age}" onchange="updateProfileField('age', parseInt(this.value) || 0)">
                    </div>
                    <div class="form-group">
                        <label class="form-label">⚧️ Пол</label>
                        <select class="form-select" id="profileGender" onchange="updateProfileField('gender', this.value)">
                            <option value="male" ${user.gender === 'male' ? 'selected' : ''}>👨 Мужской</option>
                            <option value="female" ${user.gender === 'female' ? 'selected' : ''}>👩 Женский</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">📏 Рост (см)</label>
                        <input class="form-input" id="profileHeight" type="number" value="${user.height}" onchange="updateProfileField('height', parseInt(this.value) || 0)">
                    </div>
                    <div class="form-group">
                        <label class="form-label">⚖️ Вес (кг)</label>
                        <input class="form-input" id="profileWeight" type="number" value="${user.weight}" onchange="updateProfileField('weight', parseInt(this.value) || 0)">
                    </div>
                </div>

                <!-- ИМТ -->
                <div style="margin-top:16px;padding:16px;background:var(--bg);border-radius:12px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                        <span style="font-weight:600;font-size:16px;">📊 Индекс массы тела</span>
                        <span style="font-size:20px;font-weight:700;color:${bmiInfo.color};">${bmi || '—'}</span>
                    </div>
                    <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden;position:relative;">
                        <div style="height:100%;width:${bmi ? Math.min((bmi / 40) * 100, 100) : 0}%;background:${bmiInfo.color};border-radius:4px;transition:width 0.5s;"></div>
                    </div>
                    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-top:4px;">
                        <span>${bmiInfo.emoji} ${bmiInfo.label}</span>
                        <span>Норма: 18.5–24.9</span>
                    </div>
                </div>

                <!-- СТАТИСТИКА ПО КАТЕГОРИЯМ -->
                <div style="margin-top:16px;">
                    <div style="font-weight:600;font-size:14px;margin-bottom:8px;">📂 Статистика по категориям</div>
                    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
                        <div style="background:var(--bg);padding:10px;border-radius:12px;text-align:center;border-left:3px solid var(--category-physical);">
                            <div style="font-size:20px;">🏋️</div>
                            <div style="font-size:20px;font-weight:700;color:var(--category-physical);">${categoryStats.physical.count}</div>
                            <div style="font-size:11px;color:var(--text-secondary);">✅ ${categoryStats.physical.done} выполнено</div>
                        </div>
                        <div style="background:var(--bg);padding:10px;border-radius:12px;text-align:center;border-left:3px solid var(--category-creative);">
                            <div style="font-size:20px;">🎨</div>
                            <div style="font-size:20px;font-weight:700;color:var(--category-creative);">${categoryStats.creative.count}</div>
                            <div style="font-size:11px;color:var(--text-secondary);">✅ ${categoryStats.creative.done} выполнено</div>
                        </div>
                        <div style="background:var(--bg);padding:10px;border-radius:12px;text-align:center;border-left:3px solid var(--category-practical);">
                            <div style="font-size:20px;">🛠️</div>
                            <div style="font-size:20px;font-weight:700;color:var(--category-practical);">${categoryStats.practical.count}</div>
                            <div style="font-size:11px;color:var(--text-secondary);">✅ ${categoryStats.practical.done} выполнено</div>
                        </div>
                    </div>
                </div>

                <!-- СТАТИСТИКА ЗАДАЧ -->
                <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                    <div style="background:var(--bg);padding:12px;border-radius:12px;text-align:center;">
                        <div style="font-size:24px;font-weight:700;color:var(--accent);">${stats.total}</div>
                        <div style="font-size:13px;color:var(--text-secondary);">Всего задач</div>
                    </div>
                    <div style="background:var(--bg);padding:12px;border-radius:12px;text-align:center;">
                        <div style="font-size:24px;font-weight:700;color:var(--success);">${stats.completed}</div>
                        <div style="font-size:13px;color:var(--text-secondary);">✅ Выполнено</div>
                    </div>
                    <div style="background:var(--bg);padding:12px;border-radius:12px;text-align:center;">
                        <div style="font-size:24px;font-weight:700;color:#fdcb6e;">${stats.inProgress}</div>
                        <div style="font-size:13px;color:var(--text-secondary);">🔄 В процессе</div>
                    </div>
                    <div style="background:var(--bg);padding:12px;border-radius:12px;text-align:center;">
                        <div style="font-size:24px;font-weight:700;color:var(--danger);">${stats.failed}</div>
                        <div style="font-size:13px;color:var(--text-secondary);">❌ Невыполнено</div>
                    </div>
                </div>

                <!-- УРОВЕНЬ И ОПЫТ -->
                <div style="margin-top:16px;padding:12px;background:var(--bg);border-radius:12px;text-align:center;">
                    <div style="font-size:14px;color:var(--text-secondary);">🎮 Уровень <strong style="color:var(--accent);font-size:20px;">${user.level}</strong></div>
                    <div style="font-size:14px;color:var(--text-secondary);">⭐ Опыт: ${Math.round(user.exp * 100) / 100} / ${user.level}</div>
                    <div style="height:6px;background:var(--border);border-radius:3px;margin-top:6px;overflow:hidden;">
                        <div style="height:100%;width:${Math.min((user.exp / user.level) * 100, 100)}%;background:var(--accent);border-radius:3px;transition:width 0.5s;"></div>
                    </div>
                    <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">
                        До следующего уровня: ${Math.round((user.level - user.exp) * 100) / 100} опыта
                    </div>
                </div>
            `;

            openModal('👤 Профиль', content);
        }

        // ============================================
        // 14. ПУНКТЫ МЕНЮ
        // ============================================
        function openTasks() {
            openModal('📋 Задачи', getTasksHTML());
            renderTasks();
        }

        function openGallery() {
            openModal('🖼️ Галерея', getGalleryHTML());
            renderGallery();
        }

        function openSettings() {
            const theme = document.documentElement.getAttribute('data-theme') || 'light';
            openModal('⚙️ Настройки', `
                <p><strong>Тема:</strong> ${theme === 'light' ? '☀️ Светлая' : '🌙 Тёмная'}</p>
                <button class="form-btn" style="margin-top:12px;" onclick="toggleTheme()">
                    Сменить тему
                </button>
                <hr style="margin:16px 0;border-color:var(--border);">
                <p style="color:var(--text-secondary);font-size:14px;">
                    🔄 Синхронизация с трекерами (в планах)<br>
                    📦 Импорт/экспорт данных
                </p>
                <p style="color:var(--text-secondary);font-size:13px;margin-top:12px;">
                    Сделано с ❤️ Саша и Дэн AI
                </p>
            `);
        }

        function openInfo() {
            openModal('ℹ️ Информация', `
                <h3 style="margin-bottom:8px;color:var(--text);">🎮 RPG Система</h3>
                <p style="color:var(--text-secondary);">
                    <strong>Опыт:</strong> 1 минута = 0.01 опыта<br>
                    <strong>Уровни:</strong> для N уровня нужно N опыта
                </p>
                <p style="margin-top:12px;color:var(--text-secondary);">
                    Выполняй задачи, прокачивай навыки! 💪
                </p>
            `);
        }

        // ============================================
        // 15. ТЕМА И КНОПКА "СЕГОДНЯ"
        // ============================================
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme') || 'light';
            const next = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('themeBtn').textContent = next === 'light' ? '🌙' : '☀️';
            if (document.getElementById('modalTitle').textContent.includes('Настройки')) {
                openSettings();
            }
        }

        function loadTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeBtn').textContent = theme === 'light' ? '🌙' : '☀️';
        }

        function goToToday() {
            const today = new Date();
            currentDate = today;

            if (currentMode === 'month') {
                renderMonthView();
            } else {
                currentMode = 'month';
                document.querySelectorAll('.modes__btn').forEach(b => {
                    b.classList.remove('modes__btn--active');
                });
                document.querySelector('.modes__btn[data-mode="month"]').classList.add('modes__btn--active');
                document.getElementById('monthTitle').textContent = months[today.getMonth()] + ' ' + today.getFullYear();
                renderMonthView();
            }
        }

        // ============================================
        // 16. ОБРАБОТЧИКИ
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            loadTheme();
            loadUser();
            loadTasks();
            loadGallery();

            currentMode = 'month';
            document.querySelector('.modes__btn[data-mode="month"]').classList.add('modes__btn--active');
            renderMonthView();

            document.getElementById('todayBtn').addEventListener('click', goToToday);

            document.getElementById('prevMonth').addEventListener('click', function() {
                switch (currentMode) {
                    case 'day':
                        currentDate.setDate(currentDate.getDate() - 1);
                        document.getElementById('monthTitle').textContent = '📅 День';
                        renderDayView(currentDate);
                        break;
                    case 'week':
                        currentDate.setDate(currentDate.getDate() - 7);
                        document.getElementById('monthTitle').textContent = '📅 Неделя';
                        renderWeekView(currentDate);
                        break;
                    case 'month':
                        changeMonth(-1);
                        break;
                    case 'year':
                        currentDate.setFullYear(currentDate.getFullYear() - 1);
                        document.getElementById('monthTitle').textContent = '📅 ' + currentDate.getFullYear();
                        renderYearView(currentDate.getFullYear());
                        break;
                }
            });

            document.getElementById('nextMonth').addEventListener('click', function() {
                switch (currentMode) {
                    case 'day':
                        currentDate.setDate(currentDate.getDate() + 1);
                        document.getElementById('monthTitle').textContent = '📅 День';
                        renderDayView(currentDate);
                        break;
                    case 'week':
                        currentDate.setDate(currentDate.getDate() + 7);
                        document.getElementById('monthTitle').textContent = '📅 Неделя';
                        renderWeekView(currentDate);
                        break;
                    case 'month':
                        changeMonth(1);
                        break;
                    case 'year':
                        currentDate.setFullYear(currentDate.getFullYear() + 1);
                        document.getElementById('monthTitle').textContent = '📅 ' + currentDate.getFullYear();
                        renderYearView(currentDate.getFullYear());
                        break;
                }
            });

            document.getElementById('menuBtn').addEventListener('click', function() {
                document.getElementById('sidebar').classList.add('sidebar--open');
            });
            document.getElementById('sidebarOverlay').addEventListener('click', function() {
                document.getElementById('sidebar').classList.remove('sidebar--open');
            });

            document.querySelectorAll('.sidebar__item').forEach(function(el) {
                el.addEventListener('click', function() {
                    const page = this.dataset.page;
                    document.getElementById('sidebar').classList.remove('sidebar--open');

                    switch (page) {
                        case 'profile':
                            openProfile();
                            break;
                        case 'tasks':
                            openTasks();
                            break;
                        case 'gallery':
                            openGallery();
                            break;
                        case 'settings':
                            openSettings();
                            break;
                        case 'info':
                            openInfo();
                            break;
                    }
                });
            });

            document.getElementById('modalClose').addEventListener('click', closeModal);
            document.getElementById('mainModal').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });

            document.querySelectorAll('.modes__btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.modes__btn').forEach(b => {
                        b.classList.remove('modes__btn--active');
                    });
                    this.classList.add('modes__btn--active');

                    const mode = this.dataset.mode;
                    currentMode = mode;
                    const titleEl = document.getElementById('monthTitle');

                    switch (mode) {
                        case 'day':
                            titleEl.textContent = '📅 День';
                            const today = new Date();
                            currentDate = today;
                            renderDayView(today);
                            break;
                        case 'week':
                            titleEl.textContent = '📅 Неделя';
                            const today2 = new Date();
                            const weekStart = new Date(today2);
                            weekStart.setDate(today2.getDate() - today2.getDay() + (today2.getDay() === 0 ? -6 :
                            1));
                            currentDate = weekStart;
                            renderWeekView(weekStart);
                            break;
                        case 'month':
                            titleEl.textContent = months[currentDate.getMonth()] + ' ' + currentDate
                            .getFullYear();
                            renderMonthView();
                            break;
                        case 'year':
                            titleEl.textContent = '📅 ' + currentDate.getFullYear();
                            renderYearView(currentDate.getFullYear());
                            break;
                    }
                });
            });

            document.getElementById('themeBtn').addEventListener('click', toggleTheme);

            console.log('🚀 SkillQuest запущен!');
            console.log('👤 ' + user.name + ', Уровень: ' + user.level);
            console.log('📋 Задач: ' + tasks.length + ', 📸 Фото: ' + gallery.length);
        });

        // Экспортируем функции
        window.openAddTask = openAddTask;
        window.closeAddTask = closeAddTask;
        window.handleAddTask = handleAddTask;
        window.openAddTaskForDate = openAddTaskForDate;
        window.completeTask = completeTask;
        window.deleteTask = deleteTask;
        window.openAddPhoto = openAddPhoto;
        window.closeAddPhoto = closeAddPhoto;
        window.handleAddPhoto = handleAddPhoto;
        window.deleteGalleryItem = deleteGalleryItem;
        window.toggleTheme = toggleTheme;
        window.openProfile = openProfile;
        window.openTasks = openTasks;
        window.openGallery = openGallery;
        window.openSettings = openSettings;
        window.openInfo = openInfo;
        window.closeModal = closeModal;
        window.updateProfileField = updateProfileField;
        window.handleAvatarUpload = handleAvatarUpload;
        window.openTaskEditorForDate = openTaskEditorForDate;
        window.closeTaskEditor = closeTaskEditor;
        window.saveTaskEditor = saveTaskEditor;
        window.clearTaskOverride = clearTaskOverride;
        window.updateTaskOverride = updateTaskOverride;
        window.goToToday = goToToday;
    </script>

</body>
</html>
